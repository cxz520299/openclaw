<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw</title>
  </head>
  <body>
    <script>
      (function () {
        var gatewayUrl =
          (location.protocol === "https:" ? "wss://" : "ws://") +
          location.host +
          "/ws";
        var current = new URLSearchParams((location.hash || "").replace(/^#/, ""));
        if (!current.get("gatewayUrl")) current.set("gatewayUrl", gatewayUrl);
        if (!current.get("token")) current.set("token", "__OPENCLAW_GATEWAY_TOKEN__");
        if (!current.get("session") || current.get("session") === "main") current.set("session", "desk");
        location.replace("/app/#" + current.toString());
      })();
    </script>
  </body>
</html>
