<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灏忔櫤鎺у埗鍙?/title>
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/svg+xml" href="/app/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/app/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/app/apple-touch-icon.png" />
    <link rel="stylesheet" crossorigin href="/app/assets/index-C4-UYVQd.css" />
    <style>
      [data-xz-hide-debug="1"] {
        display: none !important;
      }

      body[data-xz-clean-ui="1"] article[data-xz-role="tool-card"],
      body[data-xz-clean-ui="1"] section[data-xz-role="tool-card"],
      body[data-xz-clean-ui="1"] li[data-xz-role="tool-card"],
      body[data-xz-clean-ui="1"] div[data-xz-role="tool-card"] {
        display: none !important;
      }
    </style>
    <script>
      (function () {
        var defaultSession = "desk";
        var gatewayUrl =
          (location.protocol === "https:" ? "wss://" : "ws://") +
          location.host +
          "/ws";
        var current = new URLSearchParams((location.hash || "").replace(/^#/, ""));
        var changed = false;
        var currentSession = current.get("session") || "";
        var nextSession = !currentSession || currentSession === "main" ? defaultSession : currentSession;

        if (current.get("gatewayUrl") !== gatewayUrl) {
          current.set("gatewayUrl", gatewayUrl);
          changed = true;
        }

        if (current.get("token") !== "__OPENCLAW_GATEWAY_TOKEN__") {
          current.set("token", "__OPENCLAW_GATEWAY_TOKEN__");
          changed = true;
        }

        if (current.get("session") !== nextSession) {
          current.set("session", nextSession);
          changed = true;
        }

        if (changed) {
          location.replace("/app/#" + current.toString());
          return;
        }

        var HIDE_MARKERS = [
          "read heartbeat.md if it exists",
          "reply heartbeat_ok",
          "do not infer or repeat old tasks from prior chats",
          "<available_skills>",
          "<skill>",
          "with from /usr/local/lib/node_modules/openclaw/skills/"
        ];

        var HIDE_PATTERNS = [
          /\bread heartbeat\.md if it exists\b/i,
          /\breply heartbeat_ok\b/i,
          /\bdo not infer or repeat old tasks from prior chats\b/i,
          /\bwith\s+from\s+\/usr\/local\/lib\/node_modules\/openclaw\/skills\//i,
          /<available_skills>/i,
          /<skill>/i
        ];

        function shouldHide(text) {
          var value = String(text || "").trim().toLowerCase();
          if (!value) return false;
          if (
            HIDE_MARKERS.some(function (marker) {
              return value.indexOf(marker) !== -1;
            })
          ) {
            return true;
          }
          return HIDE_PATTERNS.some(function (pattern) {
            return pattern.test(value);
          });
        }

        function findCard(node) {
          if (!(node instanceof HTMLElement)) return null;
          var currentNode = node;
          for (var i = 0; i < 6 && currentNode; i += 1) {
            var tag = (currentNode.tagName || "").toLowerCase();
            var text = String(currentNode.innerText || currentNode.textContent || "")
              .trim()
              .toLowerCase();
            if (
              tag === "article" ||
              tag === "section" ||
              tag === "li" ||
              (tag === "div" && text.indexOf("tool") !== -1)
            ) {
              return currentNode;
            }
            currentNode = currentNode.parentElement;
          }
          return node;
        }

        function markNode(node) {
          if (!(node instanceof HTMLElement)) return;
          if (
            node.dataset.xzKeepVisible === "1" ||
            node.closest("[data-xz-keep-visible='1']")
          ) {
            return;
          }

          var text = (node.innerText || node.textContent || "").trim();
          if (!shouldHide(text)) return;

          var card = findCard(node);
          if (card instanceof HTMLElement) {
            card.setAttribute("data-xz-hide-debug", "1");
            card.setAttribute("data-xz-role", "tool-card");
          } else {
            node.setAttribute("data-xz-hide-debug", "1");
          }
        }

        function sweep(root) {
          if (!(root instanceof HTMLElement || root instanceof Document)) return;
          var nodes = root.querySelectorAll
            ? root.querySelectorAll("article, section, li, div, span, button")
            : [];
          for (var i = 0; i < nodes.length; i += 1) {
            markNode(nodes[i]);
          }
          if (root instanceof HTMLElement) {
            markNode(root);
          }
        }

        function protectComposer(root) {
          if (!(root instanceof HTMLElement || root instanceof Document)) return;
          var composer = root.querySelector
            ? root.querySelector(
                "textarea, input[type='text'], input:not([type]), [contenteditable='true']"
              )
            : null;
          if (!(composer instanceof HTMLElement)) return;
          composer.setAttribute("data-xz-keep-visible", "1");
          var composerCard = findCard(composer);
          if (composerCard instanceof HTMLElement) {
            composerCard.setAttribute("data-xz-keep-visible", "1");
          }
        }

        var chatWatchdog = {
          lastSignature: "",
          lastActivityAt: Date.now(),
          lastConnectAt: 0,
          lastRefreshAt: 0,
          refreshInFlight: false
        };

        function getOpenClawApp() {
          var app = document.querySelector("openclaw-app");
          return app instanceof HTMLElement ? app : null;
        }

        function getChatSignature(app) {
          return [
            app.connected ? "1" : "0",
            app.sessionKey || "",
            app.chatRunId || "",
            app.chatLoading ? "1" : "0",
            app.chatStream || "",
            Array.isArray(app.chatQueue) ? app.chatQueue.length : 0,
            Array.isArray(app.chatMessages) ? app.chatMessages.length : 0,
            app.lastError || ""
          ].join("|");
        }

        function getLastChatMessage(app) {
          if (!app || !Array.isArray(app.chatMessages) || app.chatMessages.length === 0) {
            return null;
          }
          return app.chatMessages[app.chatMessages.length - 1];
        }

        function hasPendingAssistantReply(app) {
          var lastMessage = getLastChatMessage(app);
          if (!lastMessage || typeof lastMessage !== "object") return false;
          var role = typeof lastMessage.role === "string" ? lastMessage.role : "";
          return role !== "" && role !== "assistant";
        }

        function shouldWatchChat(app) {
          if (!app || app.tab !== "chat") return false;
          return Boolean(
            app.chatRunId ||
              app.chatLoading ||
              hasPendingAssistantReply(app) ||
              (Array.isArray(app.chatQueue) && app.chatQueue.length > 0) ||
              !app.connected ||
              app.lastError
          );
        }

        function refreshChatHistory(app) {
          if (!app || !app.client || !app.connected || !app.sessionKey || chatWatchdog.refreshInFlight) {
            return;
          }
          chatWatchdog.refreshInFlight = true;
          chatWatchdog.lastRefreshAt = Date.now();
          Promise.resolve(
            app.client.request("chat.history", {
              sessionKey: app.sessionKey,
              limit: 200
            })
          )
            .then(function (res) {
              var messages = Array.isArray(res && res.messages) ? res.messages : [];
              var lastMessage = messages.length > 0 ? messages[messages.length - 1] : null;
              app.chatMessages = messages;
              app.chatThinkingLevel = res && res.thinkingLevel ? res.thinkingLevel : null;
              if (lastMessage && lastMessage.role === "assistant") {
                app.chatStream = null;
                app.chatStreamStartedAt = null;
                app.chatRunId = null;
                app.chatLoading = false;
              } else if (lastMessage && lastMessage.role) {
                app.chatLoading = true;
                if (app.chatStream === null) {
                  app.chatStream = "";
                }
                if (!app.chatStreamStartedAt) {
                  app.chatStreamStartedAt = Date.now();
                }
              }
              if (messages.length > 0) {
                chatWatchdog.lastActivityAt = Date.now();
                chatWatchdog.lastSignature = getChatSignature(app);
              }
            })
            .catch(function () {})
            .finally(function () {
              chatWatchdog.refreshInFlight = false;
            });
        }

        function nudgeChatConnection(app) {
          if (!app) return;
          var now = Date.now();
          if (hasPendingAssistantReply(app)) {
            app.chatLoading = true;
            if (app.chatStream === null) {
              app.chatStream = "";
            }
            if (!app.chatStreamStartedAt) {
              app.chatStreamStartedAt = now;
            }
          }
          if (!app.connected || !app.client) {
            if (typeof app.connect === "function" && now - chatWatchdog.lastConnectAt > 4000) {
              chatWatchdog.lastConnectAt = now;
              app.connect();
            }
            return;
          }
          if (now - chatWatchdog.lastRefreshAt > 2500) {
            refreshChatHistory(app);
          }
        }

        function startChatWatchdog() {
          window.setInterval(function () {
            var app = getOpenClawApp();
            if (!app) return;

            var signature = getChatSignature(app);
            if (signature !== chatWatchdog.lastSignature) {
              chatWatchdog.lastSignature = signature;
              chatWatchdog.lastActivityAt = Date.now();
            }

            if (!shouldWatchChat(app)) {
              return;
            }

            var queueLength = Array.isArray(app.chatQueue) ? app.chatQueue.length : 0;
            var stalled =
              (app.chatRunId || app.chatLoading || queueLength > 0 || hasPendingAssistantReply(app)) &&
              Date.now() - chatWatchdog.lastActivityAt > 3000;

            if (stalled || !app.connected || app.lastError) {
              nudgeChatConnection(app);
            }
          }, 1500);

          document.addEventListener("visibilitychange", function () {
            if (document.visibilityState !== "visible") return;
            nudgeChatConnection(getOpenClawApp());
          });

          window.addEventListener("focus", function () {
            nudgeChatConnection(getOpenClawApp());
          });
        }

        document.addEventListener("DOMContentLoaded", function () {
          document.body.setAttribute("data-xz-clean-ui", "1");
          protectComposer(document);
          startChatWatchdog();
          sweep(document);
          var observer = new MutationObserver(function (mutations) {
            for (var i = 0; i < mutations.length; i += 1) {
              var mutation = mutations[i];
              for (var j = 0; j < mutation.addedNodes.length; j += 1) {
                var added = mutation.addedNodes[j];
                if (added instanceof HTMLElement) {
                  protectComposer(added);
                  sweep(added);
                }
              }
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
        });
      })();
    </script>
    <script type="module" crossorigin src="/app/assets/index-CenotFkT.js"></script>
  </head>
  <body>
    <openclaw-app></openclaw-app>
  </body>
</html>
