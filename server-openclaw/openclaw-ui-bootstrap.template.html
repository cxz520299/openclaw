<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw</title>
  </head>
  <body>
    <script>
      (function () {
        var gatewayUrl =
          (location.protocol === "https:" ? "wss://" : "ws://") +
          location.host +
          "/ws";
        location.replace(
          "/app/#" +
            new URLSearchParams({
              gatewayUrl: gatewayUrl,
              token: "__OPENCLAW_GATEWAY_TOKEN__",
              session: "desk"
            }).toString()
        );
      })();
    </script>
  </body>
</html>
