services:
  openclaw-data-permissions:
    image: openclaw-vps:local
    user: "0:0"
    restart: "no"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      STREAM_FRAME_WATCH_STATE_DIR: ${STREAM_FRAME_WATCH_STATE_DIR:-/home/node/.openclaw/workspace/stream-watch/state}
      STREAM_FRAME_WATCH_CACHE_DIR: ${STREAM_FRAME_WATCH_CACHE_DIR:-/home/node/.openclaw/workspace/stream-watch/cache}
    volumes:
      - ${OPENCLAW_DATA_DIR}:/home/node/.openclaw
      - ./scripts:/opt/openclaw/scripts:ro
    command: ["sh", "/opt/openclaw/scripts/repair-workspace-permissions.sh"]

  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_GIT_REF: ${OPENCLAW_GIT_REF:-v2026.4.8}
    image: openclaw-vps:local
    restart: unless-stopped
    init: true
    depends_on:
      openclaw-data-permissions:
        condition: service_completed_successfully
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      WECOM_BOT_ID: ${WECOM_BOT_ID:-}
      WECOM_BOT_SECRET: ${WECOM_BOT_SECRET:-}
      WECOM_PLUGIN_NPM_SPEC: ${WECOM_PLUGIN_NPM_SPEC:-@wecom/wecom-openclaw-plugin@1.0.11}
      WECOM_DOC_MCP_URL: ${WECOM_DOC_MCP_URL:-}
      WECOM_UPLOAD_IMAGE_API_URL: ${WECOM_UPLOAD_IMAGE_API_URL:-}
      WECOM_UPLOAD_IMAGE_ACCESS_TOKEN: ${WECOM_UPLOAD_IMAGE_ACCESS_TOKEN:-}
      WECOM_UPLOAD_IMAGE_ACCESS_TOKEN_COMMAND: ${WECOM_UPLOAD_IMAGE_ACCESS_TOKEN_COMMAND:-}
      WECOM_UPLOAD_CORPID: ${WECOM_UPLOAD_CORPID:-}
      WECOM_UPLOAD_SECRET: ${WECOM_UPLOAD_SECRET:-}
      FFMPEG_BIN: ${FFMPEG_BIN:-}
      INSPECTION_API_BASE_URL: ${INSPECTION_API_BASE_URL:-http://inspection-api:8080/api}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ${OPENCLAW_DATA_DIR}:/home/node/.openclaw
      - ${OPENCLAW_DATA_DIR}/xhs:/home/node/.xhs-mcp
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./config:/opt/openclaw/config:ro
      - ./scripts:/opt/openclaw/scripts:ro
      - ./plugins/social-mcp:/opt/openclaw/plugins/social-mcp:ro
      - ./plugins/wecom-doc-mcp:/opt/openclaw/plugins/wecom-doc-mcp:ro
      - ./plugins/stream-frame-watch:/opt/openclaw/plugins/stream-frame-watch:ro
      - ./okinto-openai-proxy.mjs:/opt/openclaw/okinto-openai-proxy.mjs:ro
      - ./forward-browser-ui.mjs:/opt/openclaw/forward-browser-ui.mjs:ro
      - ./services/stream-frame-watch:/opt/openclaw/services/stream-frame-watch:ro
      - ./start-openclaw.sh:/opt/openclaw/start-openclaw.sh:ro
    ports:
      - "${OPENCLAW_BIND_IP:-127.0.0.1}:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BIND_IP:-127.0.0.1}:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "${OPENCLAW_BIND_IP:-127.0.0.1}:${OPENCLAW_BROWSER_PORT:-18791}:18791"
      - "127.0.0.1:18801:18801"
    networks:
      default:
      backplane:
        ipv4_address: 172.30.0.10
    command: ["sh", "/opt/openclaw/start-openclaw.sh"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: openclaw-vps:local
    profiles: ["cli"]
    init: true
    network_mode: "service:openclaw-gateway"
    stdin_open: true
    tty: true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      WECOM_BOT_ID: ${WECOM_BOT_ID:-}
      WECOM_BOT_SECRET: ${WECOM_BOT_SECRET:-}
      WECOM_PLUGIN_NPM_SPEC: ${WECOM_PLUGIN_NPM_SPEC:-@wecom/wecom-openclaw-plugin@1.0.11}
      WECOM_DOC_MCP_URL: ${WECOM_DOC_MCP_URL:-}
      WECOM_UPLOAD_IMAGE_API_URL: ${WECOM_UPLOAD_IMAGE_API_URL:-}
      WECOM_UPLOAD_IMAGE_ACCESS_TOKEN: ${WECOM_UPLOAD_IMAGE_ACCESS_TOKEN:-}
      WECOM_UPLOAD_IMAGE_ACCESS_TOKEN_COMMAND: ${WECOM_UPLOAD_IMAGE_ACCESS_TOKEN_COMMAND:-}
      WECOM_UPLOAD_CORPID: ${WECOM_UPLOAD_CORPID:-}
      WECOM_UPLOAD_SECRET: ${WECOM_UPLOAD_SECRET:-}
      FFMPEG_BIN: ${FFMPEG_BIN:-}
      INSPECTION_API_BASE_URL: ${INSPECTION_API_BASE_URL:-http://inspection-api:8080/api}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ${OPENCLAW_DATA_DIR}:/home/node/.openclaw
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./config:/opt/openclaw/config:ro
      - ./plugins/stream-frame-watch:/opt/openclaw/plugins/stream-frame-watch:ro
      - ./services/stream-frame-watch:/opt/openclaw/services/stream-frame-watch:ro
    entrypoint: ["node", "/app/dist/index.js"]
    depends_on:
      - openclaw-gateway

  openclaw-ui:
    image: nginx:alpine
    profiles: ["ui"]
    restart: unless-stopped
    depends_on:
      - openclaw-gateway
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./openclaw-ui-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./openclaw-ui-bootstrap.html:/usr/share/nginx/html/index.html:ro
      - ./control-ui-dist:/usr/share/nginx/html/app:ro
    ports:
      - "127.0.0.1:18800:18800"

  openclaw-web:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_healthy
      inspection-api:
        condition: service_started
      inspection-admin:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./openclaw-ui-bootstrap.html:/srv/index.html:ro
      - ./openclaw-control-shell.html:/srv/openclaw-control-shell.html:ro
      - ./control-ui-dist:/srv/app:ro
      - ${OPENCLAW_DATA_DIR}/workspace/reports:/srv/reports:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      default:
      backplane:
        ipv4_address: 172.30.0.20
    ports:
      - "80:80"
      - "443:443"

  inspection-api:
    build:
      context: ./inspection-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      INSPECTION_API_PORT: 8080
      INSPECTION_DB_DRIVER: ${INSPECTION_DB_DRIVER:-sqlite}
      INSPECTION_DB_DSN: ${INSPECTION_DB_DSN:-/app/data/inspection-platform.db}
      INSPECTION_ALLOWED_ORIGINS: ${INSPECTION_ALLOWED_ORIGINS:-https://ai.euzhi.com}
    volumes:
      - ${OPENCLAW_DATA_DIR}/inspection-platform:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  inspection-admin:
    build:
      context: ./inspection-admin
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      inspection-api:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  weibo-mcp:
    profiles: ["social"]
    build:
      context: .
      dockerfile: services/weibo-mcp/Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  xhs-mcp:
    profiles: ["social"]
    build:
      context: .
      dockerfile: services/xhs-mcp/Dockerfile
    restart: unless-stopped
    environment:
      DISPLAY: :99
      HOME: /home/node
      XHS_HOST: 0.0.0.0
      XHS_PORT: 3100
      XHS_HEADLESS: "true"
      PUPPETEER_CACHE_DIR: /opt/puppeteer
    volumes:
      - ${OPENCLAW_DATA_DIR}/xhs:/home/node/.xhs-mcp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qq-bot-bridge:
    profiles: ["qq"]
    image: openclaw-vps:local
    restart: unless-stopped
    depends_on:
      - openclaw-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      QQ_BOT_APP_ID: ${QQ_BOT_APP_ID}
      QQ_BOT_APP_SECRET: ${QQ_BOT_APP_SECRET}
      OPENCLAW_QQ_AGENT: ${OPENCLAW_QQ_AGENT:-main}
      OPENCLAW_QQ_BIND: 0.0.0.0
      OPENCLAW_QQ_PORT: ${OPENCLAW_QQ_PORT:-3400}
      OPENCLAW_QQ_TIMEOUT_SECONDS: ${OPENCLAW_QQ_TIMEOUT_SECONDS:-300}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
    volumes:
      - ${OPENCLAW_DATA_DIR}:/home/node/.openclaw
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./services/qq-bot-bridge:/opt/openclaw/services/qq-bot-bridge:ro
    command: ["node", "/opt/openclaw/services/qq-bot-bridge/server.mjs"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3400/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  stream-frame-watch:
    profiles: ["watch"]
    image: openclaw-vps:local
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      openclaw-data-permissions:
        condition: service_completed_successfully
      openclaw-gateway:
        condition: service_started
    network_mode: "service:openclaw-gateway"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      WECOM_BOT_ID: ${WECOM_BOT_ID:-}
      WECOM_BOT_SECRET: ${WECOM_BOT_SECRET:-}
      WECOM_PLUGIN_NPM_SPEC: ${WECOM_PLUGIN_NPM_SPEC:-@wecom/wecom-openclaw-plugin@1.0.11}
      WECOM_DOC_MCP_URL: ${WECOM_DOC_MCP_URL:-}
      WECOM_UPLOAD_IMAGE_API_URL: ${WECOM_UPLOAD_IMAGE_API_URL:-}
      WECOM_UPLOAD_IMAGE_ACCESS_TOKEN: ${WECOM_UPLOAD_IMAGE_ACCESS_TOKEN:-}
      WECOM_UPLOAD_IMAGE_ACCESS_TOKEN_COMMAND: ${WECOM_UPLOAD_IMAGE_ACCESS_TOKEN_COMMAND:-}
      WECOM_UPLOAD_CORPID: ${WECOM_UPLOAD_CORPID:-}
      WECOM_UPLOAD_SECRET: ${WECOM_UPLOAD_SECRET:-}
      STREAM_FRAME_WATCH_CONFIG: ${STREAM_FRAME_WATCH_CONFIG:-/opt/openclaw/config/stream-frame-watch.json}
      STREAM_FRAME_WATCH_LOOP_SECONDS: ${STREAM_FRAME_WATCH_LOOP_SECONDS:-15}
      STREAM_FRAME_WATCH_STATE_DIR: ${STREAM_FRAME_WATCH_STATE_DIR:-/home/node/.openclaw/workspace/stream-watch/state}
      FFMPEG_BIN: ${FFMPEG_BIN:-}
      INSPECTION_API_BASE_URL: ${INSPECTION_API_BASE_URL:-http://inspection-api:8080/api}
    volumes:
      - ${OPENCLAW_DATA_DIR}:/home/node/.openclaw
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./config:/opt/openclaw/config:ro
      - ${OPENCLAW_DATA_DIR}/extensions/wecom-openclaw-plugin:/app/extensions/wecom-openclaw-plugin:ro
      - ./plugins/social-mcp:/opt/openclaw/plugins/social-mcp:ro
      - ./plugins/wecom-doc-mcp:/opt/openclaw/plugins/wecom-doc-mcp:ro
      - ./plugins/stream-frame-watch:/opt/openclaw/plugins/stream-frame-watch:ro
      - ./services/stream-frame-watch:/opt/openclaw/services/stream-frame-watch:ro
    command:
      [
        "node",
        "/opt/openclaw/services/stream-frame-watch/index.mjs",
        "daemon",
        "--config",
        "/opt/openclaw/config/stream-frame-watch.json"
      ]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:

networks:
  backplane:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
